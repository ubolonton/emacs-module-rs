name: CI

on:
  push:
    branches:
      - master
      - ci
      - github-actions
    paths-ignore:
      - guide/**
  pull_request:
    branches:
      - master
    paths-ignore:
      - guide/**

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
          - macos-14
          - ubuntu-22.04
          - ubuntu-24.04
          - windows-2022
          - windows-2025
        emacs-version:
          - '26.3'
          - '27.2'
          - '28.2'
          - '29.2'
        exclude:
          - os: macos-13
            emacs-version: 26.3
          - os: macos-13
            emacs-version: 27.2
          - os: macos-14
            emacs-version: 26.3
          - os: macos-14
            emacs-version: 27.2
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Rust
        run: |
          rustup install stable
          rustc -Vv
          cargo -V

      - uses: actions/checkout@v4

      - name: Build
        run: ./bin/build

      - run: cargo test --all

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - run: ./bin/test

  ci-aarch64:
    runs-on: macos-13
    steps:
      - name: Set up Rust
        run: |
          rustup install stable
          rustup target add aarch64-apple-darwin
          rustc -Vv
          cargo -V

      - uses: actions/checkout@v4

      - name: Build
        run: ./bin/build
        env:
          CARGO_BUILD_TARGET: aarch64-apple-darwin
